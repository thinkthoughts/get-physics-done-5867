# Admin-owned release workflow:
# - Run manually from `main` when you want to prepare a public release.
# - This workflow never publishes anything and never pushes to `main`.
# - It updates all versioned public surfaces, validates release artifacts, then
#   opens a release PR on `release/vX.Y.Z`.
name: prepare release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run — validate and preview without opening a release PR"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare-release:
    name: ${{ inputs.dry_run && 'prepare release (dry run)' || 'prepare release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      release_branch: ${{ steps.prepare.outputs.release_branch }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}

    steps:
      - name: Ensure workflow runs from default branch
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "::error::Run this workflow from ${{ github.event.repository.default_branch }}."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install development dependencies
        run: |
          uv sync --dev --frozen

      - name: Fetch tags
        run: git fetch --tags origin

      - name: Prepare release files
        id: prepare
        run: |
          uv run python scripts/release_workflow.py prepare --repo . --bump "${{ inputs.bump }}" > /tmp/release-metadata.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("/tmp/release-metadata.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              for key in ("version", "previous_version", "release_branch"):
                  fh.write(f"{key}={metadata[key]}\n")
          PY

      - name: Check tag does not already exist
        run: |
          VERSION="${{ steps.prepare.outputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists."
            exit 1
          fi

      - name: Run release validation suite
        run: |
          uv run pytest tests/test_release_consistency.py -v
          uv build
          uv run --with twine python -m twine check dist/*
          npm_config_cache="$(mktemp -d)" npm pack --dry-run --json >/tmp/npm-pack.json

      - name: Write dry-run summary
        if: inputs.dry_run
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("/tmp/release-metadata.json").read_text(encoding="utf-8"))
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(
              "## Prepare release dry run\n\n"
              f"- Previous version: `v{metadata['previous_version']}`\n"
              f"- Next version: `v{metadata['version']}`\n"
              f"- Release branch: `{metadata['release_branch']}`\n"
              "- Updated files: `CHANGELOG.md`, `CITATION.cff`, `README.md`, `package.json`, `pyproject.toml`\n"
              "- Result: validated only; no branch, PR, tag, or publish step was created\n\n"
              "## Release notes\n\n"
              f"{metadata['release_notes']}\n",
              encoding="utf-8",
          )
          print(summary.read_text(encoding="utf-8"))
          PY

      - name: Ensure release branch and PR do not already exist
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          RELEASE_BRANCH="${{ steps.prepare.outputs.release_branch }}"
          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch $RELEASE_BRANCH already exists on origin."
            exit 1
          fi

          EXISTING_PR_URL=$(gh pr list --state open --base "$DEFAULT_BRANCH" --head "$RELEASE_BRANCH" --json url --jq '.[0].url')
          if [ -n "$EXISTING_PR_URL" ]; then
            echo "::error::Release PR already exists: $EXISTING_PR_URL"
            exit 1
          fi

      - name: Create release pull request
        id: create_pr
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # The version bump is reviewed like any other change: commit it on a
          # release branch, open a PR, and let the normal protected-branch flow
          # merge it into `main`.
          VERSION="${{ steps.prepare.outputs.version }}"
          RELEASE_BRANCH="${{ steps.prepare.outputs.release_branch }}"

          git switch -c "$RELEASE_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md CITATION.cff README.md package.json pyproject.toml
          git commit -m "release: v${VERSION}"
          git push --set-upstream origin "$RELEASE_BRANCH"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("/tmp/release-metadata.json").read_text(encoding="utf-8"))
          default_branch = os.environ["DEFAULT_BRANCH"]
          Path("/tmp/release-pr-body.md").write_text(
              "## Summary\n"
              f"- Prepare release `v{metadata['version']}` from `{default_branch}`.\n"
              "- Update the tracked version, changelog, and citation surfaces for the next public release.\n"
              "- Validate the Python and npm release artifacts before any publish step.\n\n"
              "## Release notes\n\n"
              f"{metadata['release_notes']}\n\n"
              "## After merge\n"
              "- Run the `Publish release` workflow from `main`.\n",
              encoding="utf-8",
          )
          PY

          gh pr create --base "$DEFAULT_BRANCH" --head "$RELEASE_BRANCH" --title "release: v${VERSION}" --body-file /tmp/release-pr-body.md
          PR_URL=$(gh pr list --state open --base "$DEFAULT_BRANCH" --head "$RELEASE_BRANCH" --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "::error::Failed to determine the new release PR URL."
            exit 1
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Write release PR summary
        if: ${{ !inputs.dry_run }}
        env:
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("/tmp/release-metadata.json").read_text(encoding="utf-8"))
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          pr_url = os.environ.get("PR_URL", "").strip()
          summary.write_text(
              "## Prepare release\n\n"
              f"- Previous version: `v{metadata['previous_version']}`\n"
              f"- Next version: `v{metadata['version']}`\n"
              f"- Release branch: `{metadata['release_branch']}`\n"
              f"- Release PR: {pr_url}\n"
              "- Updated versioned files: `CHANGELOG.md`, `CITATION.cff`, `README.md`, `package.json`, `pyproject.toml`\n"
              "- Publish-date fields are stamped later by `Publish release`, so the final release date comes from the actual publish day.\n"
              "- Next step: merge the release PR, then run `Publish release` from `main`\n\n"
              "## Release notes\n\n"
              f"{metadata['release_notes']}\n",
              encoding="utf-8",
          )
          print(summary.read_text(encoding="utf-8"))
          PY